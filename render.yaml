services:
  - type: worker
    name: boswell-audit-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: starter
    region: oregon
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WORKER_SECRET
        sync: false
      - key: BOSWELL_ENGINE_GIT_URL
        value: git+https://github.com/Eddiebm/boswell.git
      - key: NODE_ENV
        value: production
