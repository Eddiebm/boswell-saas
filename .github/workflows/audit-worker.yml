name: Boswell audit worker

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

concurrency:
  group: boswell-audit-worker
  cancel-in-progress: false

jobs:
  process-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Boswell engine
        run: |
          python -m pip install --upgrade pip
          python -m pip install "git+https://github.com/Eddiebm/boswell.git"
          python -c "import boswell; from boswell.cli import main; print('boswell ok')"

      - name: Process next queued audit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          BOSWELL_ENGINE_GIT_URL: ${{ secrets.BOSWELL_ENGINE_GIT_URL }}
          ADMIN_ALERT_EMAIL: ${{ secrets.ADMIN_ALERT_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          AUTH_URL: https://boswell-saas.vercel.app
          BOSWELL_CLOUD_WORKER: "1"
          BOSWELL_PYTHON: python
          BOSWELL_SKIP_ENGINE_INSTALL: "1"
          NODE_ENV: production
        run: npx tsx scripts/worker-once.ts
